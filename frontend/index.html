<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BurchTickets — Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* (style unchanged for brevity — same as existing) */
</style>
</head>
<body>

<!-- existing body content above stays the same... -->

<!-- Strategy call page -->
<div class="page" id="page-strategy">
  <section class="section" style="min-height:60vh;">
    <div style="max-width:760px;margin:0 auto;">
      <div class="eyebrow">Free strategy call</div>
      <h1 style="font-size:clamp(30px,4vw,42px);">Book a 30-minute strategy call</h1>
      <p class="sub">Get a tailored revenue & marketing audit for your event or venue — we'll prepare a short action plan and follow up with next steps.</p>

      <div class="form-card" style="margin-top:24px;">
        <form id="strategyForm" onsubmit="submitStrategyCall(event)">
          <div class="form-group"><label>Full name</label><input type="text" id="scName" required></div>
          <div class="form-group"><label>Email</label><input type="email" id="scEmail" required></div>
          <div class="form-group"><label>Phone (07XXXXXXXX)</label><input type="text" id="scPhone"></div>
          <div class="form-group"><label>Company / organiser</label><input type="text" id="scCompany"></div>
          <div class="form-group"><label>Preferred date & time</label><input type="datetime-local" id="scPreferred"></div>
          <div class="form-group"><label>What would you like help with?</label><textarea id="scMessage" rows="4"></textarea></div>
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
            <input type="checkbox" id="scAIPrep"> <label for="scAIPrep">Send an AI-generated briefing before the call (optional)</label>
          </div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-ghost" type="button" onclick="navigate('home')">Cancel</button>
            <button class="btn btn-primary" type="submit">Request a call</button>
          </div>
        </form>
      </div>

      <div id="strategyResult" style="margin-top:14px;"></div>

    </div>
  </section>
</div>

<script>
  async function submitStrategyCall(e){
    e.preventDefault();
    const payload = {
      name: document.getElementById('scName').value.trim(),
      email: document.getElementById('scEmail').value.trim(),
      phone: document.getElementById('scPhone').value.trim(),
      company: document.getElementById('scCompany').value.trim(),
      preferredDate: document.getElementById('scPreferred').value || null,
      message: document.getElementById('scMessage').value.trim() || null,
      source: window.location.pathname,
      ai_prep: document.getElementById('scAIPrep').checked,
    };
    try{
      const res = await api('/strategy-call', { method:'POST', body: payload });
      document.getElementById('strategyResult').innerHTML = `<div class="status-banner verified"><div class="status-dot"></div><div><div class="status-title">Request received</div><div class="status-sub">Thanks — we'll be in touch by email to confirm the time. Request ID: ${res.id}</div></div></div>`;
      document.getElementById('strategyForm').reset();
    }catch(err){ showToast(friendlyError(err), true); }
  }
</script>

</body>
</html>
